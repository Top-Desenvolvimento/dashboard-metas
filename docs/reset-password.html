<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(0,232,255,.08), transparent 30%),
        radial-gradient(circle at top right, rgba(18,217,159,.06), transparent 24%),
        linear-gradient(180deg, #030912, #06111c 45%, #030912 100%);
      font-family: Inter, Arial, sans-serif;
      color: #eef8ff;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, rgba(13,31,49,.98), rgba(10,24,40,.96));
      border: 1px solid rgba(0, 232, 255, 0.12);
      border-radius: 22px;
      box-shadow: 0 0 0 1px rgba(0,232,255,.05), 0 14px 28px rgba(0,0,0,.28);
      padding: 28px;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 8px 0;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    p {
      color: #7b90a6;
      margin: 0 0 18px 0;
    }

    label {
      display: block;
      margin: 12px 0 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: #eef8ff;
      outline: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      color: #04111d;
      background: linear-gradient(135deg, rgba(0,232,255,.95), rgba(18,217,159,.95));
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 16px;
      min-height: 24px;
      font-weight: 700;
      line-height: 1.4;
    }

    .error { color: #ff4d7a; }
    .success { color: #12d99f; }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #7b90a6;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nova senha</h1>
    <p>Digite sua nova senha para concluir a recuperação.</p>

    <label for="new-password">Nova senha</label>
    <input type="password" id="new-password" placeholder="Digite a nova senha">

    <label for="confirm-password">Confirmar nova senha</label>
    <input type="password" id="confirm-password" placeholder="Repita a nova senha">

    <button id="save-password-btn">Salvar nova senha</button>

    <div class="msg" id="msg"></div>
    <div class="note" id="note"></div>
  </div>

  <script type="module" src="reset-password.js"></script>
</body>
</html>
