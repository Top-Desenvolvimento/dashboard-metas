<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Metas</title>
<style>
:root {
    --bg: #06111c;
    --bg2: #081827;
    --panel: rgba(10, 24, 40, 0.96);
    --panel-2: rgba(13, 31, 49, 0.98);
    --line: rgba(255,255,255,0.06);
    --border: rgba(0, 232, 255, 0.12);
    --text: #eef8ff;
    --muted: #7b90a6;
    --cyan: #00e8ff;
    --green: #12d99f;
    --yellow: #f5b301;
    --red: #ff4d7a;
    --shadow: 0 0 0 1px rgba(0,232,255,.05), 0 14px 28px rgba(0,0,0,.28);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Inter, Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,232,255,.08), transparent 30%),
        radial-gradient(circle at top right, rgba(18,217,159,.06), transparent 24%),
        linear-gradient(180deg, #030912, #06111c 45%, #030912 100%);
    color: var(--text);
    min-height: 100vh;
}

.wrap {
    max-width: 1550px;
    margin: 0 auto;
    padding: 24px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 18px;
}

.header-left h1 {
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: -0.03em;
}

.header-left p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 1rem;
}

.header-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
}

.pill {
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(8, 20, 33, 0.92);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    font-weight: 700;
}

.pill.btn {
    color: #04111d;
    text-decoration: none;
    background: linear-gradient(135deg, rgba(0,232,255,.95), rgba(18,217,159,.95));
}

.month-filter-wrap {
    position: relative;
}

.month-filter {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    min-width: 180px;
    padding: 14px 42px 14px 16px;
    border-radius: 14px;
    background: rgba(8, 20, 33, 0.92);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    color: var(--text);
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
}

.month-filter:focus {
    outline: none;
    border-color: rgba(0,232,255,.35);
    box-shadow: 0 0 0 3px rgba(0,232,255,.08);
}

.month-filter-wrap::after {
    content: "▾";
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 1rem;
}

.tabs {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px 0 16px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 22px;
}

.tab-btn {
    background: rgba(10, 24, 40, 0.7);
    color: var(--muted);
    border: 1px solid transparent;
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 700;
    transition: .2s ease;
}

.tab-btn:hover {
    color: var(--text);
}

.tab-btn.active {
    color: var(--cyan);
    border-color: rgba(0,232,255,.26);
    background: rgba(0,232,255,.08);
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

.top-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 16px;
    margin-bottom: 22px;
}

.info-card,
.beats-card,
.rank-card,
.summary-card,
.city-card,
.panel {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
}

.info-card,
.beats-card {
    padding: 18px;
}

.info-title,
.beats-title,
.panel-title {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-size: .82rem;
    margin-bottom: 12px;
}

.info-number {
    font-size: 3rem;
    color: var(--cyan);
    font-weight: 900;
}

.info-text {
    margin-top: 8px;
    color: var(--muted);
}

.beats-list {
    display: grid;
    gap: 10px;
}

.beat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.04);
}

.beat-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.beat-city {
    font-weight: 800;
}

.beat-meta {
    color: var(--muted);
    font-size: .88rem;
}

.beat-item strong {
    color: var(--green);
}

.empty-message {
    color: var(--muted);
}

.rankings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.rank-card {
    overflow: hidden;
}

.rank-card-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
}

.rank-card-title {
    font-size: 1.05rem;
    font-weight: 900;
}

.rank-card-body {
    padding: 8px 18px 16px;
}

.rank-row {
    display: grid;
    grid-template-columns: 290px 1fr 90px;
    gap: 14px;
    align-items: center;
    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,.05);
}

.rank-row:first-child {
    border-top: none;
}

.rank-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.rank-texts {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.rank-pos {
    min-width: 50px;
    height: 34px;
    padding: 0 10px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    background: rgba(255,255,255,.08);
}

.pos-1 { background: rgba(245,179,1,.22); color: #ffd45c; }
.pos-2 { background: rgba(180,196,210,.22); color: #dbe6ef; }
.pos-3 { background: rgba(165,102,38,.22); color: #ffb56d; }
.pos-other { color: #fff; }

.rank-city {
    font-weight: 800;
    font-size: 1rem;
}

.rank-sub {
    color: var(--muted);
    font-size: .88rem;
}

.rank-bar {
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    overflow: hidden;
}

.rank-fill {
    height: 100%;
    border-radius: 999px;
}

.rank-fill.ok { background: linear-gradient(90deg, #12d99f, #08f0c2); }
.rank-fill.warn { background: linear-gradient(90deg, #f0a500, #f7c52b); }
.rank-fill.bad { background: linear-gradient(90deg, #ff4d7a, #ff6a91); }
.rank-fill.empty { background: #25374a; }

.rank-right {
    text-align: right;
    font-weight: 900;
}

.summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 18px;
}

.summary-card {
    padding: 18px;
}

.summary-label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-size: .8rem;
    margin-bottom: 12px;
}

.summary-value {
    color: var(--cyan);
    font-size: 1.8rem;
    font-weight: 900;
}

.panel {
    padding: 18px;
    margin-bottom: 18px;
}

.panel-header {
    margin-bottom: 14px;
}

.evolution-chart {
    display: grid;
    gap: 12px;
}

.evo-row {
    display: grid;
    grid-template-columns: 220px 1fr 90px;
    gap: 14px;
    align-items: center;
}

.evo-label {
    font-weight: 700;
}

.evo-bar {
    height: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    overflow: hidden;
}

.evo-fill {
    height: 100%;
    border-radius: 999px;
}

.evo-fill.ok { background: linear-gradient(90deg, #12d99f, #08f0c2); }
.evo-fill.warn { background: linear-gradient(90deg, #f0a500, #f7c52b); }
.evo-fill.bad { background: linear-gradient(90deg, #ff4d7a, #ff6a91); }
.evo-fill.empty { background: #25374a; }

.evo-value {
    text-align: right;
    font-weight: 900;
}

.city-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 18px;
}

.city-card {
    padding: 18px;
}

.city-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
}

.city-card-title {
    font-size: 1.02rem;
    font-weight: 900;
}

.city-card-progress {
    font-weight: 900;
}

.city-bar {
    height: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    overflow: hidden;
    margin-bottom: 14px;
}

.city-fill {
    height: 100%;
    border-radius: 999px;
}

.city-fill.ok { background: linear-gradient(90deg, #12d99f, #08f0c2); }
.city-fill.warn { background: linear-gradient(90deg, #f0a500, #f7c52b); }
.city-fill.bad { background: linear-gradient(90deg, #ff4d7a, #ff6a91); }
.city-fill.empty { background: #25374a; }

.city-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.metric-box {
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.04);
    border-radius: 12px;
    padding: 12px;
}

.metric-box span {
    display: block;
    color: var(--muted);
    font-size: .82rem;
    margin-bottom: 6px;
}

.metric-box strong {
    font-size: 1rem;
}

.table-wrap {
    overflow-x: auto;
}

.dash-table {
    width: 100%;
    border-collapse: collapse;
}

.dash-table th,
.dash-table td {
    text-align: left;
    padding: 14px 12px;
    border-top: 1px solid rgba(255,255,255,.05);
}

.dash-table th {
    color: var(--muted);
    text-transform: uppercase;
    font-size: .82rem;
    letter-spacing: .05em;
}

.td-title {
    font-weight: 800;
}

.ok {
    color: var(--green);
}

.warn {
    color: var(--yellow);
}

.bad {
    color: var(--red);
}

.empty {
    color: var(--muted);
}

@keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: .45; transform: scale(1.03); }
}

.blink {
    animation: pulse 1.2s infinite;
}

@media (max-width: 1280px) {
    .top-grid,
    .rankings-grid,
    .summary-grid,
    .city-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 960px) {
    .header {
        flex-direction: column;
    }

    .header-left h1 {
        font-size: 2.1rem;
    }

    .rank-row,
    .evo-row {
        grid-template-columns: 1fr;
    }

    .rank-right,
    .evo-value {
        text-align: left;
    }

    .city-metrics {
        grid-template-columns: 1fr;
    }

    .month-filter {
        min-width: 100%;
    }
}
</style>
</head>

    if (aNull !== bNull) return aNull ? 1 : -1;
    if ((b[1] || 0) !== (a[1] || 0)) return (b[1] || 0) - (a[1] || 0);
    return a[0].localeCompare(b[0]);
  });

  return ranking;
}

function renderRankingCard(titulo, ranking) {
  const linhas = ranking.map(function(item, idx) {
    const pos = idx + 1;
    const cidade = item[0];
    const p = item[1];
    const dados = item[2] || {};
    const status = classePercentual(p);
    const largura = larguraBarra(p);

    let posClass = "pos-other";
    if (pos === 1) posClass = "pos-1";
    else if (pos === 2) posClass = "pos-2";
    else if (pos === 3) posClass = "pos-3";

    return `
      <div class="rank-row">
        <div class="rank-left">
          <div class="rank-pos ${posClass}">${String(pos).padStart(2, "0")}º</div>
          <div class="rank-texts">
            <div class="rank-city">${cidade}</div>
            <div class="rank-sub">Meta: ${textoSeguro(dados.meta)} | Realizado: ${textoSeguro(dados.ate_o_momento)}</div>
          </div>
        </div>

        <div class="rank-center">
          <div class="rank-bar">
            <div class="rank-fill ${status}" style="width:${largura}%"></div>
          </div>
        </div>

        <div class="rank-right">
          <div class="rank-progress ${status}">${textoSeguro(dados.progresso)}</div>
        </div>
      </div>
    `;
  }).join("");

  return `
    <section class="rank-card">
      <div class="rank-card-header">
        <div class="rank-card-title">${titulo}</div>
      </div>
      <div class="rank-card-body">
        ${linhas}
      </div>
    </section>
  `;
}

function renderCitySummary(cidade, infoCidade) {
  const pg = progressoGeral(infoCidade);
  const pgTxt = pg !== null ? String(pg.toFixed(1)).replace(".", ",") + "%" : "—";

  return `
    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Cidade</div>
        <div class="summary-value">${cidade}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Mês de Referência</div>
        <div class="summary-value">${mesLabel((infoCidade && infoCidade.mes_referencia) || "")}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Progresso Geral</div>
        <div class="summary-value">${pgTxt}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Atualizado</div>
        <div class="summary-value">${AGORA}</div>
      </div>
    </section>
  `;
}

function renderCityChart(indicadores) {
  const linhas = INDICADORES.map(function(chave) {
    const ind = (indicadores && indicadores[chave]) || {};
    const p = percentual(ind.progresso);
    const status = classePercentual(p);
    const largura = larguraBarra(p);

    return `
      <div class="evo-row">
        <div class="evo-label">${MAPA_INDICADORES[chave]}</div>
        <div class="evo-bar-wrap">
          <div class="evo-bar">
            <div class="evo-fill ${status}" style="width:${largura}%"></div>
          </div>
        </div>
        <div class="evo-value ${status}">${textoSeguro(ind.progresso)}</div>
      </div>
    `;
  }).join("");

  return `
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">Evolução das Metas na Cidade</div>
      </div>
      <div class="evolution-chart">
        ${linhas}
      </div>
    </section>
  `;
}

function renderCityCards(indicadores) {
  return INDICADORES.map(function(chave) {
    const ind = (indicadores && indicadores[chave]) || {};
    const p = percentual(ind.progresso);
    const status = classePercentual(p);
    const largura = larguraBarra(p);

    return `
      <div class="city-card">
        <div class="city-card-header">
          <div class="city-card-title">${MAPA_INDICADORES[chave]}</div>
          <div class="city-card-progress ${status}">${textoSeguro(ind.progresso)}</div>
        </div>

        <div class="city-bar">
          <div class="city-fill ${status}" style="width:${largura}%"></div>
        </div>

        <div class="city-metrics">
          <div class="metric-box">
            <span>Meta</span>
            <strong>${textoSeguro(ind.meta)}</strong>
          </div>
          <div class="metric-box">
            <span>Até o momento</span>
            <strong>${textoSeguro(ind.ate_o_momento)}</strong>
          </div>
          <div class="metric-box">
            <span>Falta</span>
            <strong>${textoSeguro(ind.falta)}</strong>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function renderCityTable(indicadores) {
  const linhas = INDICADORES.map(function(chave) {
    const ind = (indicadores && indicadores[chave]) || {};
    const p = percentual(ind.progresso);
    const status = classePercentual(p);

    return `
      <tr>
        <td class="td-title">${MAPA_INDICADORES[chave]}</td>
        <td>${textoSeguro(ind.meta)}</td>
        <td>${textoSeguro(ind.ate_o_momento)}</td>
        <td>${textoSeguro(ind.falta)}</td>
        <td class="${status}">${textoSeguro(ind.progresso)}</td>
      </tr>
    `;
  }).join("");

  return `
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">Tabela Completa da Cidade</div>
      </div>
      <div class="table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <th>Indicador</th>
              <th>Meta</th>
              <th>Até o momento</th>
              <th>Falta</th>
              <th>Progresso</th>
            </tr>
          </thead>
          <tbody>
            ${linhas}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function slugify(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function bindTabs() {
  const buttons = document.querySelectorAll(".tab-btn");
  const contents = document.querySelectorAll(".tab-content");

  buttons.forEach(function(btn) {
    btn.addEventListener("click", function() {
      buttons.forEach(function(b) { b.classList.remove("active"); });
      contents.forEach(function(c) { c.classList.remove("active"); });

      btn.classList.add("active");

      const target = document.getElementById(btn.dataset.tab);
      if (target) {
        target.classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });
  });
}

function renderDashboard(mesSelecionado) {
  const base = HISTORICO[mesSelecionado] || {};
  const cidades = Object.keys(base).sort(function(a, b) { return a.localeCompare(b); });

  const batidas = metasBatidas(base);
  const blocoBatidas = batidas.length
    ? batidas.map(function(item) {
        return `
          <div class="beat-item">
            <div class="beat-left">
              <span class="beat-city">${item.cidade}</span>
              <span class="beat-meta">${item.indicador}</span>
            </div>
            <strong class="blink">${item.progresso}</strong>
          </div>
        `;
      }).join("")
    : '<div class="empty-message">Nenhuma meta acima de 100% no momento.</div>';

  const rankingCards = INDICADORES.map(function(chave) {
    return renderRankingCard(MAPA_INDICADORES[chave], gerarRanking(base, chave));
  }).join("");

  const cidadesHtml = cidades.map(function(cidade) {
    const infoCidade = base[cidade] || {};
    const indicadores = infoCidade.indicadores || {};

    return `
      <div id="${slugify(cidade)}" class="tab-content">
        ${renderCitySummary(cidade, infoCidade)}
        ${renderCityChart(indicadores)}
        <section class="city-grid">
          ${renderCityCards(indicadores)}
        </section>
        ${renderCityTable(indicadores)}
      </div>
    `;
  }).join("");

  const htmlContent = `
    <div id="ranking-geral" class="tab-content active">
      <section class="top-grid">
        <div class="info-card">
          <div class="info-title">Unidades</div>
          <div class="info-number">${cidades.length}</div>
          <div class="info-text">cidades monitoradas</div>
        </div>

        <div class="beats-card">
          <div class="beats-title">Metas Batidas</div>
          <div class="beats-list">
            ${blocoBatidas}
          </div>
        </div>
      </section>

      <section class="rankings-grid">
        ${rankingCards}
      </section>
    </div>

    ${cidadesHtml}
  `;

  document.getElementById("dashboardContent").innerHTML = htmlContent;
  document.getElementById("monthFilter").value = mesSelecionado;
  bindTabs();
}

const monthFilter = document.getElementById("monthFilter");
if (monthFilter) {
  monthFilter.addEventListener("change", function(e) {
    renderDashboard(e.target.value);
  });
}

renderDashboard(MES_ATUAL);
</script>
<script type="module" src="auth.js"></script>
</body>
</html>
