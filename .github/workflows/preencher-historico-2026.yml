name: Preencher histórico 2026

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  historico-2026:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Garantir pasta histórico
        run: mkdir -p data/historico

      - name: Rodar histórico de janeiro a dezembro de 2026
        env:
          LOGIN_USER: ${{ secrets.LOGIN_USER }}
          LOGIN_PASS: ${{ secrets.LOGIN_PASS }}
        run: |
          for MES in 2026-01 2026-02 2026-03 2026-04 2026-05 2026-06 2026-07 2026-08 2026-09 2026-10 2026-11 2026-12
          do
            echo "========================================"
            echo "Rodando mês: $MES"
            echo "========================================"
            MES_REFERENCIA="$MES" python extract_metas.py
          done

      - name: Gerar dashboard HTML
        run: python generate_dashboard.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historico data/metas_atual.json docs/index.html docs/auth.js docs/metas_top_estetica.xlsx
          git commit -m "Preenchimento histórico 2026" || echo "Sem mudanças para commit"
          git pull --rebase origin main
          git push origin main
