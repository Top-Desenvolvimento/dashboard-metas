name: Acompanhamento de Metas Top 2026

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-dashboard:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar com main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium do Playwright
        run: |
          python -m playwright install chromium

      - name: Executar coleta de dados do sistema
        env:
          LOGIN_USER: ${{ secrets.LOGIN_USER }}
          LOGIN_PASS: ${{ secrets.LOGIN_PASS }}
          SYSTEM_LOGIN: ${{ secrets.LOGIN_USER }}
          SYSTEM_PASSWORD: ${{ secrets.LOGIN_PASS }}
          MES_REFERENCIA: 'AUTO'
        run: |
          python extract_metas.py

      - name: Executar coleta de avaliações do Google
        run: |
          python extract_google_reviews.py

      - name: Upload debug Google
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-debug
          path: data/google_debug/

      - name: Mesclar dados do Google
        run: |
          python merge_google.py
      - name: Atualizar dashboard HTML
        run: |
          python generate_dashboard.py

      - name: Commit e push das alterações
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/ docs/

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
          else
            git commit -m "Atualização automática $(date +'%d/%m/%Y %H:%M')"
            git push origin main
          fi

      - name: Upload artifact do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: update-dashboard
    runs-on: ubuntu-22.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
