name: Atualizar Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # a cada 6 horas

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Rodar extração
        env:
          SYSTEM_LOGIN: ${{ secrets.SYSTEM_LOGIN }}
          SYSTEM_PASSWORD: ${{ secrets.SYSTEM_PASSWORD }}
        run: |
          python extract_metas.py

      - name: Gerar dashboard
        run: |
          python generate_dashboard.py

      - name: Commit e push (se houver mudanças)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "Atualização automática do dashboard" && git push)
