name: Atualizar Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"   # a cada 10 minutos

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Coletar dados
        env:
          LOGIN_USER: ${{ secrets.SYSTEM_LOGIN }}
          LOGIN_PASS: ${{ secrets.SYSTEM_PASSWORD }}
        run: |
          python extract_metas.py

      - name: Gerar dashboard
        env:
          LOGIN_USER: ${{ secrets.SYSTEM_LOGIN }}
          LOGIN_PASS: ${{ secrets.SYSTEM_PASSWORD }}
        run: |
          python generate_dashboard.py

      - name: Commit e push (se houver mudanças)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --staged --quiet || (git commit -m "Atualização automática do dashboard" && git push)
