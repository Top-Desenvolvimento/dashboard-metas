name: Atualização mensal metas

on:
  schedule:
    - cron: "0 11 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-mes-atual:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Rodar coleta do mês atual
        env:
          LOGIN_USER: ${{ secrets.LOGIN_USER }}
          LOGIN_PASS: ${{ secrets.LOGIN_PASS }}
          MES_REFERENCIA: "AUTO"
        run: python extract_metas.py

      - name: Gerar dashboard HTML
        run: python generate_dashboard.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historico data/metas_atual.json docs/index.html docs/auth.js docs/metas_top_estetica.xlsx
          git commit -m "Atualização mensal automática das metas" || echo "Sem mudanças para commit"
          git pull --rebase origin main
          git push origin main
