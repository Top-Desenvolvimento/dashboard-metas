name: Atualização mensal metas

on:
  workflow_dispatch:
    inputs:
      mes_referencia:
        description: "Mês referência no formato YYYY-MM. Ex: 2026-03. Use AUTO para mês atual."
        required: true
        default: "AUTO"
  schedule:
    - cron: "0 11 1 * *"

permissions:
  contents: write

jobs:
  atualizar-metas:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Definir mês de referência
        run: |
          if [ "${{ github.event.inputs.mes_referencia }}" = "" ]; then
            echo "MES_REFERENCIA=AUTO" >> $GITHUB_ENV
          else
            echo "MES_REFERENCIA=${{ github.event.inputs.mes_referencia }}" >> $GITHUB_ENV
          fi

      - name: Rodar coleta de dados do sistema
        env:
          LOGIN_USER: ${{ secrets.LOGIN_USER }}
          LOGIN_PASS: ${{ secrets.LOGIN_PASS }}
          MES_REFERENCIA: ${{ env.MES_REFERENCIA }}
        run: python aplicar_google_manual_v2.py
      - name: Aplicar Google manual
        env:
          MES_REFERENCIA: ${{ env.MES_REFERENCIA }}
        run: python aplicar_google_manual.py

      - name: Gerar dashboard HTML
        run: python generate_dashboard.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/metas_atual.json data/historico data/google_manual.json docs/index.html docs/auth.js docs/metas_top_estetica.xlsx

          git commit -m "Atualização automática das metas" || echo "Sem mudanças para commit"

          git fetch origin main
          git pull origin main --no-rebase -X ours || true

          git add data/metas_atual.json data/historico data/google_manual.json docs/index.html docs/auth.js docs/metas_top_estetica.xlsx
          git commit -m "Ajuste pós-merge metas" || echo "Sem mudanças após merge"

          git push origin main
